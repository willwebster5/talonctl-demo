name: Weekly Template Discovery

on:
  schedule:
    # Run every Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual triggers
    inputs:
      vendors:
        description: 'Vendors to discover templates for (comma-separated)'
        required: false
        default: 'aws,microsoft,google,crowdstrike'
        type: string
      max_templates:
        description: 'Maximum new templates to process'
        required: false
        default: '50'
        type: string
      priority_filter:
        description: 'Priority filter (high,critical,medium,low,info)'
        required: false
        default: 'high,critical,medium,low,info'
        type: string
      exclude_experimental:
        description: 'Exclude experimental templates'
        required: false
        default: true
        type: boolean

jobs:
  discover-templates:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: main
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install talonctl
        pip install fuzzywuzzy python-levenshtein
        
    - name: Create credentials directory
      run: |
        mkdir -p ~/.config/falcon
        
    - name: Setup CrowdStrike credentials
      run: |
        cat > ~/.config/falcon/credentials.json << EOF
        {
          "falcon_client_id": "${{ secrets.FALCON_CLIENT_ID }}",
          "falcon_client_secret": "${{ secrets.FALCON_CLIENT_SECRET }}",
          "falcon_customer_id": "${{ secrets.FALCON_CUSTOMER_ID }}",
          "base_url": "${{ secrets.FALCON_BASE_URL }}"
        }
        EOF

    - name: Generate unique discovery branch name
      run: |
        # Generate unique branch name with random pet name
        YEAR=$(date +%Y)
        WEEK=$(date +%V)

        # Random adjectives and animals for fun branch names
        ADJECTIVES=("happy" "brave" "swift" "clever" "mighty" "gentle" "bold" "wise" "keen" "bright" "proud" "calm" "fierce" "noble" "quick" "silent")
        ANIMALS=("penguin" "dolphin" "eagle" "fox" "wolf" "bear" "hawk" "tiger" "panda" "otter" "falcon" "raven" "shark" "lion" "deer" "owl")

        # Generate random hash for uniqueness
        HASH=$(openssl rand -hex 2)

        # Pick random adjective and animal
        ADJ=${ADJECTIVES[$RANDOM % ${#ADJECTIVES[@]}]}
        ANIMAL=${ANIMALS[$RANDOM % ${#ANIMALS[@]}]}

        # Create unique branch name (don't create the branch yet - let create-pull-request action handle it)
        BRANCH_NAME="discovery-${YEAR}-w${WEEK}-${ADJ}-${ANIMAL}-${HASH}"

        echo "Will use discovery branch: $BRANCH_NAME"

        # Store branch name for later steps
        echo "DISCOVERY_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV

    - name: Run template discovery
      id: discovery
      run: |
        # Set default values for workflow_dispatch inputs
        VENDORS="${{ github.event.inputs.vendors || 'aws,microsoft,google' }}"
        MAX_TEMPLATES="${{ github.event.inputs.max_templates || '50' }}"
        PRIORITY_FILTER="${{ github.event.inputs.priority_filter || 'high,critical' }}"
        EXCLUDE_EXPERIMENTAL="${{ github.event.inputs.exclude_experimental || 'true' }}"
        
        # Build command with conditional arguments
        CMD="talonctl discover --auto-review --output-format json --max-new-templates $MAX_TEMPLATES --priority-filter $PRIORITY_FILTER"
        
        # Add vendor filter (convert comma-separated to space-separated)
        VENDOR_ARGS=$(echo "$VENDORS" | tr ',' ' ')
        CMD="$CMD --vendor $VENDOR_ARGS"
        
        if [ "$EXCLUDE_EXPERIMENTAL" = "true" ]; then
          CMD="$CMD --exclude-experimental"
        fi
        
        # Run discovery and capture results
        echo "Running: $CMD"
        $CMD > discovery_results.json
        
        # Validate discovery results
        if [ ! -f discovery_results.json ]; then
          echo "❌ Discovery failed - no results file generated"
          exit 1
        fi
        
        TOTAL_FOUND=$(jq -r '.summary.total_generated // 0' discovery_results.json)
        if [ "$TOTAL_FOUND" -eq 0 ]; then
          echo "ℹ️ No new templates discovered - ending workflow gracefully"
          echo "no_discoveries=true" >> $GITHUB_OUTPUT
        fi
        
        # Parse results for PR details
        NEW_TEMPLATES=$(jq -r '.summary.new_templates // 0' discovery_results.json)
        UPDATED_TEMPLATES=$(jq -r '.summary.updated_templates // 0' discovery_results.json)
        TOTAL_GENERATED=$(jq -r '.summary.total_generated // 0' discovery_results.json)
        
        echo "new_templates=$NEW_TEMPLATES" >> $GITHUB_OUTPUT
        echo "updated_templates=$UPDATED_TEMPLATES" >> $GITHUB_OUTPUT
        echo "total_generated=$TOTAL_GENERATED" >> $GITHUB_OUTPUT
        echo "discovery_timestamp=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
        
    - name: Check for changes
      id: changes
      run: |
        # Check for changes in working directory (uncommitted files from discovery)
        if [ -n "$(git status --porcelain templates_review/)" ]; then
          echo "changes=true" >> $GITHUB_OUTPUT

          # Count new and modified YAML template files only
          NEW_FILES=$(git status --porcelain templates_review/ | grep '^??' | awk '{print $2}' | grep '\.yaml$' | wc -l)
          MODIFIED_FILES=$(git status --porcelain templates_review/ | grep '^.M' | awk '{print $2}' | grep '\.yaml$' | wc -l)
          
          echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "modified_files=$MODIFIED_FILES" >> $GITHUB_OUTPUT
          
          # Generate categorized file list for PR body
          echo "## 📁 Discovered Templates by Vendor" > changed_files.md
          echo "" >> changed_files.md
          
          # Count NEW templates by vendor (only count files with git status "??")
          VENDOR_SUMMARY=""
          VENDOR_OUTPUTS=""
          TOTAL_BY_VENDOR=0

          # Get list of new template files only
          NEW_TEMPLATE_FILES=$(git status --porcelain templates_review/ | grep '^??' | awk '{print $2}' | grep '\.yaml$' || true)

          if [ -n "$NEW_TEMPLATE_FILES" ]; then
            # Group new files by vendor directory
            declare -A vendor_counts

            # Count new templates by vendor
            while IFS= read -r file; do
              if [[ "$file" =~ templates_review/([^/]+)/ ]]; then
                VENDOR_NAME="${BASH_REMATCH[1]}"
                vendor_counts["$VENDOR_NAME"]=$((${vendor_counts["$VENDOR_NAME"]:-0} + 1))
              fi
            done <<< "$NEW_TEMPLATE_FILES"

            # Generate vendor summary for new templates only
            for VENDOR_NAME in $(printf '%s\n' "${!vendor_counts[@]}" | sort); do
              VENDOR_COUNT=${vendor_counts[$VENDOR_NAME]}

              # Capitalize vendor name for display (handle special cases)
              case "$VENDOR_NAME" in
                "aws") VENDOR_DISPLAY="AWS" ;;
                "microsoft") VENDOR_DISPLAY="Microsoft" ;;
                "google") VENDOR_DISPLAY="Google" ;;
                "crowdstrike") VENDOR_DISPLAY="CrowdStrike" ;;
                *) VENDOR_DISPLAY=$(echo "$VENDOR_NAME" | sed 's/.*/\L&/' | sed 's/^./\U&/') ;;
              esac

              echo "- **${VENDOR_DISPLAY}**: $VENDOR_COUNT new templates" >> changed_files.md

              # Store for commit message (format: vendor:count)
              if [ -n "$VENDOR_SUMMARY" ]; then
                VENDOR_SUMMARY="${VENDOR_SUMMARY}, ${VENDOR_DISPLAY}: ${VENDOR_COUNT}"
              else
                VENDOR_SUMMARY="${VENDOR_DISPLAY}: ${VENDOR_COUNT}"
              fi

              # Store individual counts for GitHub outputs (use lowercase for consistency)
              echo "${VENDOR_NAME}_count=$VENDOR_COUNT" >> $GITHUB_OUTPUT
              TOTAL_BY_VENDOR=$((TOTAL_BY_VENDOR + VENDOR_COUNT))
            done
          fi
          
          # Handle case where no templates found
          if [ -z "$VENDOR_SUMMARY" ]; then
            VENDOR_SUMMARY="No templates discovered"
            echo "- No templates discovered in this run" >> changed_files.md
          fi
          
          # Store summary for later use
          echo "vendor_summary=$VENDOR_SUMMARY" >> $GITHUB_OUTPUT
          echo "total_by_vendor=$TOTAL_BY_VENDOR" >> $GITHUB_OUTPUT
          echo "" >> changed_files.md
          
          echo "## 📋 Changed Files" >> changed_files.md
          echo "" >> changed_files.md
          while IFS= read -r line; do
            status="${line:0:2}"
            file="${line:3}"
            case "$status" in
              "??") echo "- **NEW**: \`$file\`" >> changed_files.md ;;
              *.M*) echo "- **MODIFIED**: \`$file\`" >> changed_files.md ;;
              *) echo "- **CHANGED**: \`$file\`" >> changed_files.md ;;
            esac
          done < <(git status --porcelain templates_review/)

          # Store the file content for PR body
          if [ -f changed_files.md ]; then
            echo "DEBUG: changed_files.md exists, contents:"
            cat changed_files.md
            {
              echo 'changed_files_content<<EOF'
              cat changed_files.md
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "DEBUG: changed_files.md does not exist!"
            echo "changed_files_content=" >> $GITHUB_OUTPUT
          fi
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "new_files=0" >> $GITHUB_OUTPUT
          echo "modified_files=0" >> $GITHUB_OUTPUT
          echo "changed_files_content=" >> $GITHUB_OUTPUT
        fi
        
    - name: Upload discovery results
      if: steps.discovery.outputs.total_generated != '0'
      uses: actions/upload-artifact@v4
      with:
        name: discovery-results
        path: |
          discovery_results.json
          changed_files.md
        retention-days: 30
        
    - name: Cleanup stale discovery PRs
      if: steps.discovery.outputs.total_generated != '0' && steps.discovery.outputs.no_discoveries != 'true'
      run: |
        # Clean up any stale discovery PRs (older than 30 days) to keep things tidy
        echo "Checking for stale template discovery PRs..."
        gh pr list --state open --label "template-discovery" --json number,createdAt,title | \
        jq -r '.[] | select((now - (.createdAt | fromdateiso8601)) > (30 * 24 * 3600)) | "\(.number): \(.title)"' | \
        while IFS=':' read -r pr_num title; do
          if [ -n "$pr_num" ]; then
            echo "Closing stale template discovery PR #$pr_num: $title"
            gh pr close $pr_num --comment "Auto-closing stale template discovery PR (>30 days old). A fresh discovery will create a new PR if needed."
          fi
        done
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Create Pull Request
      if: steps.discovery.outputs.total_generated != '0' && steps.discovery.outputs.no_discoveries != 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: |
          feat: template discovery ${{ steps.discovery.outputs.discovery_timestamp }}

          Weekly automated discovery of CrowdStrike templates
          - New: ${{ steps.discovery.outputs.new_templates }} templates
          - Updated: ${{ steps.discovery.outputs.updated_templates }} templates
          - Total: ${{ steps.discovery.outputs.total_generated }} templates
          - Vendors: ${{ github.event.inputs.vendors || 'aws,microsoft,google' }}

          Discovery branch: ${{ env.DISCOVERY_BRANCH }}
        title: "Template Discovery: ${{ env.DISCOVERY_BRANCH }} - ${{ steps.discovery.outputs.new_templates }} new templates"
        body: |
          ## 🔍 Weekly Template Discovery Results
          
          **Discovery Date**: ${{ steps.discovery.outputs.discovery_timestamp }}
          **New Templates**: ${{ steps.discovery.outputs.new_templates }}
          **Updated Templates**: ${{ steps.discovery.outputs.updated_templates }}
          **Total Generated**: ${{ steps.discovery.outputs.total_generated }}

          ### 📊 Templates by Vendor
          *Branch: `${{ env.DISCOVERY_BRANCH }}` discovered ${{ steps.discovery.outputs.total_generated }} templates*
          
          ### ⚙️ Discovery Settings
          - **Vendors**: ${{ github.event.inputs.vendors || 'aws,microsoft,google' }}
          - **Max Templates**: ${{ github.event.inputs.max_templates || '50' }}
          - **Priority Filter**: ${{ github.event.inputs.priority_filter || 'high,critical' }}
          - **Exclude Experimental**: ${{ github.event.inputs.exclude_experimental || 'true' }}
          
          ### 📋 Review Checklist
          - [ ] Review new templates for relevance to our environment
          - [ ] Check updated templates for breaking changes
          - [ ] Validate MITRE ATT&CK mappings are correct
          - [ ] Ensure severity levels are appropriate
          - [ ] Test deployment of critical templates first
          
          ### 🚀 Next Steps
          1. **Review and approve this PR**
          2. **Deploy high-priority templates first**: Focus on critical/high severity
          3. **Monitor for issues**: Watch for false positives after deployment
          4. **Update custom tuning**: Adjust queries if needed for your environment
          
          ${{ steps.changes.outputs.changed_files_content }}
          
          ---
          
          *This PR was automatically created by the weekly template discovery workflow.*
          *Branch: `${{ env.DISCOVERY_BRANCH }}` - Each discovery run creates a unique branch for easy tracking.*
          *To customize discovery settings, use the "Run workflow" button with different parameters.*
        branch: ${{ env.DISCOVERY_BRANCH }}
        base: main
        delete-branch: false
        labels: |
          template-discovery
          automated
          security
        committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
        author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
        
        
    - name: Cleanup
      if: always()
      run: |
        # Remove credentials for security
        rm -f ~/.config/falcon/credentials.json
        
    - name: Summary
      run: |
        echo "## Weekly Template Discovery Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Templates Found**: ${{ steps.discovery.outputs.total_generated }}" >> $GITHUB_STEP_SUMMARY
        echo "- **New Templates**: ${{ steps.discovery.outputs.new_templates }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Updated Templates**: ${{ steps.discovery.outputs.updated_templates }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Discovery Branch**: ${{ env.DISCOVERY_BRANCH }}" >> $GITHUB_STEP_SUMMARY

        if [ "${{ steps.discovery.outputs.total_generated }}" != "0" ]; then
          echo "- **Action**: Created new pull request on branch ${{ env.DISCOVERY_BRANCH }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Action**: No templates discovered, no PR created" >> $GITHUB_STEP_SUMMARY
        fi