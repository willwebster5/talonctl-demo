resource_id: crowdstrike_endpoint_axios_supply_chain_macos_rat_artifact
name: "CrowdStrike - Endpoint - Axios Supply Chain macOS RAT Artifact com.apple.act.mond"
rule_id: 019d4bb453fe77c784cf8d70b9f7c3ee
description: |
  Detects file creation or execution of /Library/Caches/com.apple.act.mond, the
  macOS-platform RAT dropped by the axios supply chain attack (2026-03-30). The
  plain-crypto-js@4.2.1 postinstall dropper delivers the payload via AppleScript
  executed through /bin/zsh, using a filename designed to masquerade as an Apple
  system daemon (com.apple.act.mond mimics standard com.apple.* naming).

  The RAT supports: command execution, file system enumeration, shell commands,
  payload deployment, and self-termination. C2 is sfrclak.com:8000.

  The masquerade via Apple-like naming makes this easy to miss during manual review.

  Investigation:
  1. Contain the host via CrowdStrike RTR
  2. Check if artifact exists: ls -la /Library/Caches/com.apple.act.mond
  3. Check for running process (ps aux | grep act.mond)
  4. Review LaunchAgents/LaunchDaemons for persistence: /Library/LaunchAgents/, ~/Library/LaunchAgents/
  5. Check network connections to sfrclak.com:8000
  6. Identify triggering npm project and rotate accessible credentials
  7. Inspect osascript/zsh process ancestry to confirm dropper chain

  IOC: /Library/Caches/com.apple.act.mond — macOS RAT, masquerades as Apple daemon
  Delivery: AppleScript via /bin/zsh from npm postinstall
  C2: sfrclak.com:8000
  Ref: https://thehackernews.com/2026/03/axios-supply-chain-attack-pushes-cross.html

severity: 90
status: active
mitre_attack: ["Defense Evasion (TA0005):Masquerading (T1036)"]

search:
  filter: |
    #repo="base_sensor" #Vendor="crowdstrike"
    | case {
        // File written to disk
        in(#event_simpleName, values=["NewExecutableWritten", "ScriptFileWritten", "EngineFileWritten"])
        | _path := TargetFileName
        | _event_type := "file_written"
        ;
        // Process execution
        #event_simpleName="ProcessRollup2"
        | _path := ImageFileName
        | _event_type := "process_executed"
      }
    | _path =~ /\/Library\/Caches\/com\.apple\.act\.mond/i
    | host.name := ComputerName
    | groupBy([host.name, _event_type, _path], limit=10000,
        function=[
          collect([ParentBaseFileName, UserName, CommandLine, SHA256HashData]),
          count(as=hit_count)
        ]
      )

  lookback: "1h10m"
  trigger_mode: summary
  outcome: detection
  use_ingest_time: false

operation:
  schedule:
    definition: '@every 1h'
