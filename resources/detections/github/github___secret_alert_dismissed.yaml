resource_id: github___secret_alert_dismissed
name: GitHub - Secret Scanning Alert Dismissed
rule_id: 019d2fcc0b2e7c0d948c7cc88742f5e4
description: |
  Detects when a GitHub secret scanning alert is dismissed. Dismissing an alert
  without rotating the exposed credential leaves the secret active in the repository.
  Each dismissal should be verified to confirm the secret was actually rotated.

  Risk: Credential exposure persists, potential unauthorized access via leaked secret
  Response: Verify the dismissed secret was rotated, check if the secret was used
           by an attacker, review the dismissal reason provided

severity: 50
status: inactive
mitre_attack: ["TA0006:T1552.004"]
search:
  filter: |
    source_type=github
    | Vendor.action="dismissed"

    // Apply enrichment functions
    | $github_enrich_event_context()
    | $github_classify_sender_type()

    // Format timestamp
    | _TimestampET := formatTime("%Y-%m-%d %H:%M:%S ET", field=@timestamp, timezone="America/New_York")

    // After-hours flag
    | case {
        test(github.event_hour >= 22) | _AfterHours := "Yes" ;
        test(github.event_hour <= 6) | _AfterHours := "Yes" ;
        * | _AfterHours := "No" ;
    }

    // Risk scoring based on dismissal context
    | _RiskScore := 60
    | case {
        _AfterHours="Yes" | _RiskScore := _RiskScore + 10 ;
        * ;
    }

    | table([
        _TimestampET,
        github.actor,
        github.actor_email,
        github.sender_category,
        github.organization,
        github.repository,
        Vendor.alert.secret_type,
        Vendor.alert.resolution,
        _AfterHours,
        _RiskScore
    ])
    | sort(_RiskScore, order=desc)

  lookback: 1h0m
  trigger_mode: summary
  outcome: detection
  use_ingest_time: true
operation:
  schedule:
    definition: '@every 1h0m'
dependencies:
  - saved_search.github_enrich_event_context
  - saved_search.github_classify_sender_type
