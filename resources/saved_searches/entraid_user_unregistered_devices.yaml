# Entra ID User Unregistered Devices
# Purpose: Find sign-ins from devices with no deviceId (completely unregistered in Entra ID)
# Version: 1.0

$schema: https://schemas.humio.com/query/v0.6.0
resource_id: entraid_user_unregistered_devices
name: entraid_user_unregistered_devices
description: |
  Function: $entraid_user_unregistered_devices(user)
  Purpose: Find sign-ins from devices with no deviceId (completely unregistered in Entra ID).
  Output: @timestamp, entra.app_name, entra.device_name, entra.operating_system, entra.browser, source.ip, entra.city, entra.country, user_agent.original
  See queryString comments for full documentation.
queryString: |
    // ============================================================
    // $entraid_user_unregistered_devices() - Unregistered Device Sign-ins
    // ============================================================
    // Find sign-ins from devices with no deviceId (completely unregistered
    // in Entra ID). Strong indicator of personal device usage -- useful
    // for legal/investigation.
    //
    // Input: Entra ID sign-in events (#Vendor=microsoft, #event.dataset=entraid.signin)
    //
    // Output Fields:
    //   @timestamp        - Sign-in time
    //   entra.app_name           - Application accessed
    //   entra.device_name        - Device display name
    //   entra.operating_system   - Device OS
    //   entra.browser     - Browser used
    //   source.ip         - Source IP address
    //   entra.city        - Geo city
    //   entra.country     - Geo country ISO code
    //   user_agent.original - Raw user agent string
    //
    // Parameters:
    //   - user: User email address (e.g., "jdoe@example.com")
    //
    // Usage:
    //   #Vendor=microsoft
    //   | #event.dataset=entraid.signin
    //   | $entraid_user_unregistered_devices(user="jdoe@example.com")
    // ============================================================

    | Vendor.properties.userPrincipalName = ?user
    | Vendor.properties.deviceDetail.deviceId = ""
    | select([@timestamp, Vendor.properties.appDisplayName, Vendor.properties.deviceDetail.displayName, Vendor.properties.deviceDetail.operatingSystem, Vendor.properties.deviceDetail.browser, source.ip, source.geo.city_name, source.geo.country_iso_code, user_agent.original])
    | rename(field=Vendor.properties.appDisplayName, as=entra.app_name)
    | rename(field=Vendor.properties.deviceDetail.displayName, as=entra.device_name)
    | rename(field=Vendor.properties.deviceDetail.operatingSystem, as=entra.operating_system)
    | rename(field=Vendor.properties.deviceDetail.browser, as=entra.browser)
    | rename(field=source.geo.city_name, as=entra.city)
    | rename(field=source.geo.country_iso_code, as=entra.country)
    | sort(@timestamp)
_search_domain: all
labels:
  - entraid
  - legal
  - investigation
  - device-audit
  - unregistered
