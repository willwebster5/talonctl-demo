# AWS Service Account Detector Function
# Purpose: Identify and flag AWS service accounts, automation users, and integration accounts
# Version: 2.0

$schema: https://schemas.humio.com/query/v0.6.0
resource_id: aws_service_account_detector
name: aws_service_account_detector
description: |
  Function: $aws_service_account_detector
  Purpose: Identify AWS service accounts, automation users, and integration accounts.
  Output: aws.is_service_account, aws.service_account_type, aws.svc_detection_confidence, aws.service_account_reason
  See queryString comments for full documentation.
queryString: |
    // ============================================================
    // $aws_service_account_detector() - Service Account Detection
    // ============================================================
    // Identify AWS service accounts, automation users, and integration
    // accounts to prevent false positives from automated activities.
    //
    // Output Fields:
    //   aws.is_service_account     - Boolean flag (true/false)
    //   aws.service_account_type   - Category of account (monitoring, crowdstrike,
    //                          data-platform, aws-managed, aws-managed-sso, cicd,
    //                          github-aws-oidc, iac, etl-pipeline, container-task,
    //                          test-automation, serverless, temporary,
    //                          potential-automation, human-user)
    //   aws.svc_detection_confidence  - Confidence level (high, medium, low, none)
    //   aws.service_account_reason - Human-readable explanation
    //
    // Parameters:
    //   - strict_mode: "true" excludes ALL automation patterns
    //   - include_temp: "true" includes temp/test account patterns
    //
    // Usage:
    //   | $aws_service_account_detector() | aws.is_service_account=false
    // ============================================================

    // Step 1: Extract and normalize user identifier from various fields
    | case {
        Vendor.userIdentity.arn=* | UserIdentifier := lower(Vendor.userIdentity.arn);
        Vendor.userIdentity.userName=* | UserIdentifier := lower(Vendor.userIdentity.userName);
        Vendor.userIdentity.principalId=* | UserIdentifier := lower(Vendor.userIdentity.principalId);
        user.name=* | UserIdentifier := lower(user.name);
        * | UserIdentifier := "unknown";
    }

    // Step 2: Check against known service account patterns
    // Add your organization's specific vendor integrations below.
    | case {
        // --- Monitoring/Observability integrations ---
        // Add your monitoring vendor's role pattern here, e.g.:
        // UserIdentifier=/your-monitoring-integration/i | aws.is_service_account := true | aws.service_account_type := "monitoring";

        // CrowdStrike CSPM
        UserIdentifier=/crowdstrikecspmreader/i | aws.is_service_account := true | aws.service_account_type := "crowdstrike";
        UserIdentifier=/crowdstrike-distributor-deploy-role/i | aws.is_service_account := true | aws.service_account_type := "crowdstrike";

        // --- Data platform integrations ---
        // Add your data platform role patterns here, e.g.:
        // UserIdentifier=/your-data-platform-crossaccount/i | aws.is_service_account := true | aws.service_account_type := "data-platform";

        // AWS Service Roles
        UserIdentifier=/awsserviceroleforsso/i | aws.is_service_account := true | aws.service_account_type := "aws-managed-sso";
        UserIdentifier=/aws-controltower-notificationforwarder/i | aws.is_service_account := true | aws.service_account_type := "aws-managed";
        UserIdentifier=/awsserviceroleforsecurityhub/i | aws.is_service_account := true | aws.service_account_type := "aws-managed";
        UserIdentifier=/awsservicerolefor/i | aws.is_service_account := true | aws.service_account_type := "aws-managed";

        // CI/CD Patterns
        // Add your CI/CD tool role patterns here, e.g.:
        // UserIdentifier=/your-cicd-server-role/i | aws.is_service_account := true | aws.service_account_type := "cicd";
        // UserIdentifier=/cicd-assume-user/i | aws.is_service_account := true | aws.service_account_type := "cicd";
        // UserIdentifier=/^repo:[^\/]+\/[^\/]+:(pull_request|ref:|environment:)/i | aws.is_service_account := true | aws.service_account_type := "repository-automation";
        // UserIdentifier=/githubactionsrole/i | aws.is_service_account := true | aws.service_account_type := "github-aws-oidc";

        // Infrastructure as Code
        // UserIdentifier=/github-actions-role/i | aws.is_service_account := true | aws.service_account_type := "iac";
        // UserIdentifier=/terraform/i | aws.is_service_account := true | aws.service_account_type := "iac";

        // ETL and Data Pipeline Tools
        // Add your ETL vendor patterns here, e.g.:
        // UserIdentifier=/your-etl-vendor/i | aws.is_service_account := true | aws.service_account_type := "etl-pipeline";

        // Container Orchestration
        // Terraform-generated Fargate task roles ({env}-{app}-fargate-{hex32})
        UserIdentifier=/-fargate-[0-9a-f]{20,}/i | aws.is_service_account := true | aws.service_account_type := "container-task";

        // Testing Frameworks
        UserIdentifier=/(playwright)/i | aws.is_service_account := true | aws.service_account_type := "test-automation";

        // CodeBuild assume roles
        UserIdentifier=/-codebuild-assume-role/i | aws.is_service_account := true | aws.service_account_type := "container-task";

        // Lambda and Tasks
        UserIdentifier=/-lambda-role\// | aws.is_service_account := true | aws.service_account_type := "serverless";
        UserIdentifier=/-tasks\// | aws.is_service_account := true | aws.service_account_type := "serverless";

        // SSM agent roles
        UserIdentifier=/_ssm_role/i | aws.is_service_account := true | aws.service_account_type := "container-task";

        // Platform Lambda functions — Terraform-named with pl- prefix + hex suffix
        UserIdentifier=/\/pl-[a-z0-9-]+-[0-9a-f]{20,}/i | aws.is_service_account := true | aws.service_account_type := "serverless";

        // ML training platform roles
        // Add your ML platform patterns here, e.g.:
        // UserIdentifier=/\/ml-platform-[a-z]+-masterrole-/i | aws.is_service_account := true | aws.service_account_type := "container-task";

        // Default case
        * | aws.is_service_account := false | aws.service_account_type := "human-user";
    }

    // Step 3: Apply strict mode additional patterns if enabled
    | case {
        strict_mode="true" AND aws.is_service_account=false AND UserIdentifier=/^[a-z]+-[a-z0-9]+-[a-z]+$/
            | aws.is_service_account := true
            | aws.service_account_type := "potential-automation";

        strict_mode="true" AND aws.is_service_account=false AND UserIdentifier=/[0-9]{10,}/
            | aws.is_service_account := true
            | aws.service_account_type := "potential-automation";

        * ;  // No change for other cases
    }

    // Step 4: Apply temporary/test patterns if enabled
    | case {
        include_temp="true" AND UserIdentifier=/test|temp|dev|sandbox|demo/i
            | aws.is_service_account := true
            | aws.service_account_type := "temporary";

        include_temp="true" AND UserIdentifier=/^(staging|dev|test)-/
            | aws.is_service_account := true
            | aws.service_account_type := "temporary";

        * ;  // No change for other cases
    }

    // Step 5: Set detection confidence level based on account type
    | case {
        aws.service_account_type="monitoring" | aws.svc_detection_confidence := "high";
        aws.service_account_type="crowdstrike" | aws.svc_detection_confidence := "high";
        aws.service_account_type="data-platform" | aws.svc_detection_confidence := "high";
        aws.service_account_type="aws-managed" | aws.svc_detection_confidence := "high";
        aws.service_account_type="aws-managed-sso" | aws.svc_detection_confidence := "high";
        aws.service_account_type="cicd" | aws.svc_detection_confidence := "medium";
        aws.service_account_type="github-aws-oidc" | aws.svc_detection_confidence := "high";
        aws.service_account_type="repository-automation" | aws.svc_detection_confidence := "high";
        aws.service_account_type="iac" | aws.svc_detection_confidence := "high";
        aws.service_account_type="etl-pipeline" | aws.svc_detection_confidence := "medium";
        aws.service_account_type="container-task" | aws.svc_detection_confidence := "medium";
        aws.service_account_type="test-automation" | aws.svc_detection_confidence := "medium";
        aws.service_account_type="serverless" | aws.svc_detection_confidence := "medium";
        aws.service_account_type="temporary" | aws.svc_detection_confidence := "low";
        aws.service_account_type="potential-automation" | aws.svc_detection_confidence := "low";
        aws.service_account_type="human-user" | aws.svc_detection_confidence := "none";
        * | aws.svc_detection_confidence := "unknown";
    }

    // Step 6: Add descriptive metadata for service accounts
    | case {
        aws.is_service_account=true | aws.service_account_reason := format("Detected as %s with %s confidence", field=[aws.service_account_type, aws.svc_detection_confidence]);
        * | aws.service_account_reason := "Not detected as service account";
    }

    // Step 7: Build multi-dimensional labels string
    // aws.service_account_labels is a pipe-delimited list of all applicable tags:
    //   functional type | environment | application | role subtype
    //
    // Usage in detections/investigations:
    //   | aws.service_account_labels =~ /app-name/
    //   | aws.service_account_labels =~ /staging/
    //   | aws.service_account_labels =~ /postgres-provisioner/
    | aws.service_account_labels := aws.service_account_type

    // Specific label overrides — for roles that don't follow naming conventions.
    // Add entries here when a role has a non-standard name but a known identity.
    // | case {
    //     UserIdentifier=/your_specific_role/i
    //         | aws.service_account_labels := format("%s|your-app|your-label", field=aws.service_account_labels);
    //     * ;
    // }

    // Environment dimension
    | case {
        UserIdentifier=/\/staging-/i | _svc_env := "staging";
        UserIdentifier=/\/prod-/i    | _svc_env := "prod";
        UserIdentifier=/\/dev-/i     | _svc_env := "dev";
        UserIdentifier=/\/qa-/i      | _svc_env := "qa";
        * ;
    }
    | case {
        _svc_env=* | aws.service_account_labels := format("%s|%s", field=[aws.service_account_labels, _svc_env]);
        * ;
    }

    // Application dimension — add your application names here
    // | case {
    //     UserIdentifier=/app-one/i       | _svc_app := "app-one";
    //     UserIdentifier=/app-two/i       | _svc_app := "app-two";
    //     * ;
    // }
    // | case {
    //     _svc_app=* | aws.service_account_labels := format("%s|%s", field=[aws.service_account_labels, _svc_app]);
    //     * ;
    // }

    // Role subtype dimension
    | case {
        UserIdentifier=/-postgres-provisioner/i              | _svc_subtype := "postgres-provisioner";
        UserIdentifier=/-fargate-[0-9a-f]{20,}/i             | _svc_subtype := "fargate-task";
        UserIdentifier=/-lambda-role\//i                     | _svc_subtype := "lambda";
        UserIdentifier=/\/pl-[a-z0-9-]+-[0-9a-f]{20,}/i     | _svc_subtype := "platform-lambda";
        UserIdentifier=/-jumpbox-route53-updater/i           | _svc_subtype := "route53-updater";
        UserIdentifier=/_ssm_role/i                          | _svc_subtype := "ssm-role";
        UserIdentifier=/-codebuild/i                         | _svc_subtype := "codebuild";
        * ;
    }
    | case {
        _svc_subtype=* | aws.service_account_labels := format("%s|%s", field=[aws.service_account_labels, _svc_subtype]);
        * ;
    }

    // Clean up temp fields
    | drop([_svc_env, _svc_app, _svc_subtype])
_search_domain: all
