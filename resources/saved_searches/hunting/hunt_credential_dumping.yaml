$schema: https://schemas.humio.com/query/v0.6.0
resource_id: hunt_credential_dumping
name: hunt_credential_dumping
description: |
  Detects credential dumping via known tool names in process command lines and image file names
  (mimikatz, procdump, pwdump, sekurlsa). Enriches with username and parent process hash.
  Source: Query-Hub (ByteRay GmbH) — MITRE T1003.001, T1003.002, T1558.003
queryString: |
  #event_simpleName=ProcessRollup2
  | (CommandLine=/mimikatz|procdump|lsass|sekurlsa/i OR ImageFileName=/\\(mimikatz|procdump|pwdump)\.exe$/i)
  | ParentImageFileName!=/\\(powershell|cmd)\.exe$/i
  | join({#event_simpleName=UserIdentity}, field=AuthenticationID, include=[UserName])
  | join({#event_simpleName=SyntheticProcessRollup2}, field=[aid, RawProcessId], include=[SHA256HashData], suffix="Parent")
  | table([aid, UserName, ImageFileName, CommandLine, ParentImageFileName, SHA256HashData])
_search_domain: all
labels:
  - hunting
  - endpoint
  - credential-access
  - T1003
